<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="數位命理諮商大師 — 提供觀音靈籤、媽祖籤、關帝籤、塔羅牌等多種占卜工具，結合東方傳統籤詩與西方塔羅智慧，為您指點迷津。">
    <meta name="keywords" content="抽籤,觀音靈籤,媽祖籤,塔羅牌,解籤,占卜,命理,籤詩">
    <meta property="og:title" content="數位命理諮商大師">
    <meta property="og:description" content="東方靈籤與西方塔羅，看透問題背後的本質">
    <title>數位命理諮商大師 2.0 | 東方靈籤 ✦ 西方塔羅</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-purple: #1e1b4b;
            --void: #020617;
            --glow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background: radial-gradient(circle at center, var(--deep-purple) 0%, var(--void) 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            pointer-events: none;
            z-index: -1;
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .gold-border { border: 1px solid var(--gold); box-shadow: var(--glow); }
        .gold-text {
            background: linear-gradient(135deg, #fef08a 0%, #d4af37 50%, #b8860b 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-mystic {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #020617;
            font-weight: bold;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-mystic:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }

        .input-dark {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: border 0.3s;
        }
        .input-dark:focus { border-color: var(--gold); outline: none; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float { animation: float 4s ease-in-out infinite; }

        .ai-meditation {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body class="p-4 md:p-10">
    <div class="stars-bg"></div>

    <!-- AI Meditation Screen -->
    <div id="loading" class="ai-meditation">
        <div class="text-7xl mb-6 float">🌌</div>
        <div class="text-2xl gold-text font-serif italic mb-2">大師正在與 H200 宇宙共鳴...</div>
        <p class="text-gray-400 animate-pulse">正在讀取未來的軌跡，請在此靜候</p>
    </div>

    <header class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 gold-text">數位命理大師 <span class="text-xl align-top text-white font-mono">2.0</span></h1>
        <p class="text-gray-400 tracking-[0.3em] uppercase text-xs md:text-sm">通連台科大 H200 地端算力 ✦ 萬世神諭全集</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Sidebar: Oracle Selection -->
        <aside class="lg:col-span-4 space-y-6">
            <div class="glass p-6 rounded-3xl">
                <h3 class="gold-text font-bold mb-4 flex items-center gap-2">🏮 選擇命理系統</h3>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="changeSystem('eastern')" id="sys-e" class="py-3 rounded-2xl glass hover:bg-gold/10 transition border-2 border-transparent">東方靈籤</button>
                    <button onclick="changeSystem('western')" id="sys-w" class="py-3 rounded-2xl glass hover:bg-blue-500/10 transition border-2 border-transparent">西方塔羅</button>
                </div>

                <!-- Eastern Config -->
                <div id="config-eastern" class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">搜尋籤種 (26 種)</label>
                        <select id="oracle-type" onchange="loadOracleList()" class="input-dark w-full p-4 rounded-2xl text-sm"></select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">選擇籤號</label>
                        <select id="oracle-id" class="input-dark w-full p-4 rounded-2xl text-sm"></select>
                    </div>
                </div>

                <!-- Western Config -->
                <div id="config-western" class="space-y-4 hidden">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">選擇牌陣</label>
                        <select id="tarot-spread" onchange="genTarotSelectors()" class="input-dark w-full p-4 rounded-2xl text-sm">
                            <option value="1">單張指引</option>
                            <option value="3" selected>三張 (過去/現在/未來)</option>
                            <option value="5">五張 (現況/挑戰/建議)</option>
                        </select>
                    </div>
                    <div id="tarot-selectors" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <section class="lg:col-span-8 space-y-6">
            <div class="glass p-8 rounded-[2.5rem]">
                <div class="mb-8">
                    <label class="block text-primary-gold font-bold mb-4 tracking-widest uppercase text-sm">諮詢範疇</label>
                    <div class="flex flex-wrap gap-2" id="category-box">
                        <button class="cat-btn px-6 py-2 rounded-xl border border-white/10 hover:border-gold/50" data-val="工作">💼 工作</button>
                        <button class="cat-btn px-6 py-2 rounded-xl border border-white/10 hover:border-gold/50" data-val="感情">❤️ 感情</button>
                        <button class="cat-btn px-6 py-2 rounded-xl border border-white/10 hover:border-gold/50" data-val="金錢">💰 金錢</button>
                        <button class="cat-btn px-6 py-2 rounded-xl border border-white/10 hover:border-gold/50" data-val="家庭">🏠 家庭</button>
                        <button class="cat-btn px-6 py-2 rounded-xl border-gold text-gold shadow-[0_0_10px_rgba(212,175,55,0.2)]" data-val="其他">其他</button>
                    </div>
                </div>

                <div class="mb-8 p-6 bg-gold/5 rounded-3xl border border-gold/20">
                    <label class="block text-gold font-bold mb-3 text-sm">具體問題諮詢 (選填)</label>
                    <textarea id="question" rows="3" class="w-full bg-transparent border-none focus:ring-0 text-lg placeholder-gray-600 italic" placeholder="例如：明年有沒有機會買房？這段婚姻是否該繼續堅持？"></textarea>
                    <p class="text-[10px] text-gray-500 mt-2">✨ 提示：若輸入具體細節問題，將啟動 H200 模型進行專屬解惑。</p>
                </div>

                <button id="random-draw-btn" onclick="randomDraw()" class="w-full py-3 mb-4 rounded-2xl border border-gold/50 text-gold hover:bg-gold/10 transition-colors flex items-center justify-center gap-2 text-sm">
                    🎲 隨機抽籤（由神明為您決定）
                </button>
                <button onclick="handleConsult()" class="btn-mystic w-full py-6 rounded-3xl text-2xl tracking-widest shadow-2xl">
                    請大師冥想解惑 ✨
                </button>
            </div>

            <!-- Result Box -->
            <div id="result-box" class="hidden glass p-10 rounded-[2.5rem] border-2 border-gold/30 bg-black/40">
                <div id="result-content"></div>
            </div>
        </section>
    </main>

    <footer class="mt-12 mb-8 text-center text-gray-500 text-sm space-y-2">
        <p class="text-gray-400">🔮 數位命理諮商大師 ✦ 台科大 H200 算力支援</p>
        <p>提供 26 種東方靈籤 ✦ 78 張塔羅牌解讀</p>
        <p class="text-xs text-gray-600">本工具僅供娛樂參考，不構成任何專業建議</p>
    </footer>

    <script>
        const API_BASE = "http://localhost:8000"; // 指向我們的 Python 後端
        let currentSystem = 'eastern';
        let currentCategory = '其他';
        let masterDB = null;

        async function init() {
            try {
                const res = await fetch('master_db.json');
                masterDB = await res.json();
                populateOracleTypes();
                changeSystem('eastern');
                genTarotSelectors();
            } catch (e) { alert("無法載入資料庫，請確認 master_db.json 是否存在"); }
        }

        const ORACLE_TYPES = {
            'mazu60': '媽祖六十甲子籤', 'guanyin100': '觀音一百籤', 'guandi100': '雷雨師一百籤',
            'tudigong28': '土地公廿八籤', 'yuelao': '月老一百籤', 'zhuge384': '諸葛神算 384',
            'sevenkings60': '七王爺靈籤', 'baosheng60': '保生大帝籤', 'qingshui50': '清水祖師籤',
            'luzu100': '呂祖一百籤', 'luzu60': '呂仙祖六十籤', 'zhusheng30': '註生娘娘籤',
            'beidi51': '北帝五十一籤', 'fourface30': '四面佛籤', 'caishin100': '財神一百籤',
            'beidi100': '北帝一百籤', 'guanyin28': '觀音廿八籤', 'guanyin24': '觀音廿四籤',
            'zodiac28': '二十八星宿籤', 'pienchu100': '藥籤一百籤', 'yaoqian50': '藥籤五十籤',
            'yaoqian200': '藥籤二百籤', 'lukang100': '鹿港天后宮', 'penghu100': '澎湖天后宮',
            'zhuge64': '諸葛六十四籤', 'zhuge32': '諸葛三十二籤'
        };

        function populateOracleTypes() {
            const select = document.getElementById('oracle-type');
            select.innerHTML = '';
            Object.keys(ORACLE_TYPES).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = ORACLE_TYPES[key];
                select.appendChild(opt);
            });
            loadOracleList();
        }

        function loadOracleList() {
            const type = document.getElementById('oracle-type').value;
            const select = document.getElementById('oracle-id');
            select.innerHTML = '';
            const list = masterDB.oracles[type] || [];
            list.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.id;
                opt.textContent = item.no || `第${item.id}籤`;
            });
        }

        function randomDraw() {
            if (currentSystem !== 'eastern') {
                alert("隨機抽籤功能僅適用於東方靈籤");
                return;
            }
            const select = document.getElementById('oracle-id');
            const opts = select.options;
            if(opts.length > 0) {
                const randIdx = Math.floor(Math.random() * opts.length);
                select.selectedIndex = randIdx;
                handleConsult();
            }
        }

        function changeSystem(sys) {
            currentSystem = sys;
            document.getElementById('config-eastern').classList.toggle('hidden', sys !== 'eastern');
            document.getElementById('config-western').classList.toggle('hidden', sys !== 'western');
            document.getElementById('sys-e').className = sys === 'eastern' ? 'py-3 rounded-2xl glass border-gold text-gold ring-2 ring-gold/20' : 'py-3 rounded-2xl glass text-gray-500 border-transparent';
            document.getElementById('sys-w').className = sys === 'western' ? 'py-3 rounded-2xl glass border-gold text-gold ring-2 ring-gold/20' : 'py-3 rounded-2xl glass text-gray-500 border-transparent';
        }

        function genTarotSelectors() {
            const count = parseInt(document.getElementById('tarot-spread').value);
            const container = document.getElementById('tarot-selectors');
            container.innerHTML = '';
            const labels = ["位置一", "位置二", "位置三", "位置四", "位置五"];
            const cardOptions = masterDB.tarot.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = "p-3 bg-white/5 rounded-xl border border-white/5 mb-2";
                div.innerHTML = `
                    <div class="text-[10px] text-gold/60 font-bold mb-1">${labels[i]}</div>
                    <div class="flex gap-2">
                        <select class="tarot-card-name w-full bg-transparent border-none text-sm p-0 focus:ring-0">${cardOptions}</select>
                        <select class="tarot-card-dir bg-transparent border-none text-xs p-0 focus:ring-0 text-gray-400">
                            <option value="正位">正位</option>
                            <option value="逆位">逆位</option>
                        </select>
                    </div>`;
                container.appendChild(div);
            }
        }

        // Category Buttons
        document.getElementById('category-box').addEventListener('click', (e) => {
            if (e.target.classList.contains('cat-btn')) {
                document.querySelectorAll('.cat-btn').forEach(b => {
                    b.classList.remove('border-gold', 'text-gold', 'shadow-[0_0_10px_rgba(212,175,55,0.2)]');
                    b.classList.add('border-white/10');
                });
                e.target.classList.add('border-gold', 'text-gold', 'shadow-[0_0_10px_rgba(212,175,55,0.2)]');
                e.target.classList.remove('border-white/10');
                currentCategory = e.target.getAttribute('data-val');
            }
        });

        async function handleConsult() {
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('result-box');
            const resultContent = document.getElementById('result-content');
            
            const payload = {
                system: currentSystem,
                question: document.getElementById('question').value,
                category: currentCategory
            };

            if (currentSystem === 'eastern') {
                payload.type = document.getElementById('oracle-type').value;
                payload.id = parseInt(document.getElementById('oracle-id').value);
            } else {
                payload.cards = Array.from(document.querySelectorAll('.tarot-card-name')).map((sel, i) => ({
                    name: sel.value,
                    dir: document.querySelectorAll('.tarot-card-dir')[i].value,
                    pos: `位置${i + 1}`
                }));
            }

            loading.style.display = 'flex';
            resultBox.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/api/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.status === 429) {
                    alert("請求太頻繁！為了保護 H200 算力，請稍候再試。");
                    return;
                }

                const result = await res.json();
                renderResult(result);
                resultBox.classList.remove('hidden');
                resultBox.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert("後端伺服器連線失敗，請確認 server.py 是否正在執行。");
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderResult(res) {
            const content = document.getElementById('result-content');
            const isAI = res.mode === 'ai';
            const data = res.data;

            let html = `<div class="fade-in">`;
            html += `<div class="flex justify-between items-center mb-6">
                        <span class="px-4 py-1 rounded-full border border-gold/40 text-gold text-[10px] uppercase tracking-widest">${isAI ? '✦ AI 深度諮商' : '✦ 資料庫經典解讀'}</span>
                        <span class="text-xs text-gray-500 font-mono">ID: ${res.mode.toUpperCase()}-${Date.now().toString().slice(-6)}</span>
                     </div>`;

            if (currentSystem === 'eastern') {
                html += `<h2 class="text-3xl font-bold gold-text text-center mb-4">📜 【${ORACLE_TYPES[data.type]} - ${data.no || `第${data.id}籤`}】</h2>`;
                html += `<div class="p-8 bg-black/60 rounded-3xl border border-gold/20 mb-8 text-center">
                            <p class="text-2xl leading-relaxed text-yellow-100 italic mb-4 font-serif whitespace-pre-line">${data.poem}</p>
                            <p class="text-sm text-gray-500 italic">典故：${data.story || '流傳神諭'}</p>
                         </div>`;
            } else {
                html += `<h2 class="text-3xl font-bold gold-text text-center mb-8">🃏 塔羅神諭深層解析</h2>`;
            }

            html += `<div class="space-y-6">
                        <div class="bg-gold/5 p-8 rounded-3xl border-l-4 border-gold">
                            <h4 class="text-gold font-bold mb-4 tracking-widest">✨ 大師開示</h4>
                            <div class="text-gray-200 leading-loose text-lg font-serif whitespace-pre-line">${res.interpretation}</div>
                        </div>
                     </div>`;
            
            html += `</div>`;
            content.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
