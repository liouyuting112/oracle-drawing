<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="數位命理諮商大師 — 提供觀音靈籤、媽祖籤、關帝籤、塔羅牌等多種占卜工具，結合東方傳統籤詩與西方塔羅智慧，為您指點迷津。">
    <meta name="keywords" content="抽籤,觀音靈籤,媽祖籤,塔羅牌,解籤,占卜,命理,籤詩">
    <meta property="og:title" content="數位命理諮商大師">
    <meta property="og:description" content="東方靈籤與西方塔羅，看透問題背後的本質">
    <title>數位命理諮商大師 | 東方靈籤 ✦ 西方塔羅</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
        }

        .gold-text {
            background: linear-gradient(to right, #fcd34d, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border {
            border-color: #d4af37;
        }

        .tab-btn {
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: rgba(212, 175, 55, 0.15);
            border-bottom: 2px solid #d4af37;
            color: #d4af37;
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .generate-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #0f172a;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        blockquote {
            border-left: 4px solid #d4af37;
            background: rgba(212, 175, 55, 0.05);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 0.5rem 0.5rem 0;
            font-style: italic;
            color: #cbd5e1;
        }

        /* Loading Animation */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Hidden by default */
        .hidden {
            display: none !important;
        }

        /* Custom Scrollbar for results */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.8);
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <!-- Header -->
    <header class="text-center mb-8 mt-4">
        <h1 class="text-4xl md:text-5xl font-bold mb-3 gold-text tracking-widest">數位命理諮商大師</h1>
        <p class="text-gray-400 text-sm md:text-base tracking-widest">通曉東西神諭，看透問題背後的本質</p>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-4xl glass-panel p-6 md:p-8">

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-6 font-bold text-lg">
            <button id="tab-eastern" class="tab-btn active flex-1 py-3 text-center text-gray-400 hover:text-gray-200"
                onclick="switchTab('eastern')">
                東方靈籤
            </button>
            <button id="tab-western" class="tab-btn flex-1 py-3 text-center text-gray-400 hover:text-gray-200"
                onclick="switchTab('western')">
                西方塔羅
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- Left Column: Inputs -->
            <div class="flex flex-col gap-5">

                <!-- Category Section (Common) -->
                <div>
                    <label class="block text-sm text-gray-300 mb-2">請問想解惑的領域為何？</label>
                    <div class="flex flex-wrap gap-2" id="category-chips">
                        <button
                            class="px-4 py-1.5 rounded-full border border-gray-600 text-sm hover:border-yellow-500 hover:text-yellow-500 transition-colors"
                            data-val="工作">💼 工作</button>
                        <button
                            class="px-4 py-1.5 rounded-full border border-gray-600 text-sm hover:border-yellow-500 hover:text-yellow-500 transition-colors"
                            data-val="感情">❤️ 感情</button>
                        <button
                            class="px-4 py-1.5 rounded-full border border-gray-600 text-sm hover:border-yellow-500 hover:text-yellow-500 transition-colors"
                            data-val="金錢">💰 金錢</button>
                        <button
                            class="px-4 py-1.5 rounded-full border border-gray-600 text-sm hover:border-yellow-500 hover:text-yellow-500 transition-colors"
                            data-val="家庭">🏠 家庭</button>
                        <button
                            class="px-4 py-1.5 rounded-full border border-yellow-500 text-yellow-500 text-sm transition-colors"
                            data-val="其他">✨ 其他</button>
                    </div>
                </div>

                <!-- Specific Question -->
                <div>
                    <label class="block text-sm text-gray-300 mb-2">您心中的具體問題是什麼？</label>
                    <textarea id="question-input" rows="3"
                        class="input-field w-full rounded-lg p-3 text-sm placeholder-gray-500"
                        placeholder="例如：這份工作做了三年很累，想辭職創業好嗎？"></textarea>
                </div>

                <!-- Eastern Specific Inputs -->
                <div id="eastern-inputs" class="flex flex-col gap-5 mt-2">
                    <div class="space-y-4 p-4 border border-gray-700 rounded-lg bg-black/20">
                        <h3 class="text-yellow-500 font-bold mb-2">籤詩設定</h3>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">搜尋 / 選擇籤種</label>
                            <input type="text" id="oracle-search" oninput="filterOracleTypes()"
                                class="input-field w-full rounded p-2 text-xs mb-2"
                                placeholder="關鍵字搜尋 (例如: 關公, 觀音, 384...)">
                            <select id="oracle-type" class="input-field w-full rounded p-2 text-sm"
                                onchange="updateOracleNumbers()">
                                <!-- Major Systems -->
                                <option value="mazu60">媽祖六十甲子籤 (60)</option>
                                <option value="guanyin100" selected>觀音一百籤 (100)</option>
                                <option value="guandi100">雷雨師一百籤 (關公/城隍) (100)</option>
                                <option value="tudigong28">烘爐地土地公廿八籤 (28)</option>
                                <option value="yuelao">月老靈籤 (100)</option>
                                <option value="sevenkings60">東港鎮海宮七王爺靈籤 (60)</option>

                                <!-- Specialized & Rare -->
                                <option value="zhuge384">諸葛神算 (384)</option>
                                <option value="baosheng60">保生大帝六十籤 (60)</option>
                                <option value="qingshui50">清水祖師五十籤 (50)</option>
                                <option value="luzu100">呂祖靈籤一百籤 (100)</option>
                                <option value="luzu60">呂仙祖六十籤 (指南宮) (60)</option>
                                <option value="zhusheng30">註生娘娘三十籤 (30)</option>
                                <option value="beidi51">北帝靈籤 (51)</option>
                                <option value="fourface30">四面佛三十籤 (30)</option>
                                <option value="caishin100">五路財神一百籤 (100)</option>
                                <option value="guanyin28">觀音廿八籤 (28)</option>
                                <option value="guanyin24">觀音廿四籤 (24)</option>
                                <option value="zodiac28">二十八星宿籤 (28)</option>
                                <option value="pienchu100">扁鵲神醫藥籤 (100)</option>
                                <option value="yaoqian50">藥籤 (50)</option>
                                <option value="yaoqian200">藥籤 (200)</option>
                                <option value="lukang100">鹿港天后宮一百籤 (100)</option>
                                <option value="penghu100">澎湖天后宮一百籤 (100)</option>
                                <option value="zhuge64">諸葛孔明六十四籤 (金錢卦) (64)</option>
                                <option value="zhuge32">諸葛孔明三十二籤 (金錢卦) (32)</option>
                            </select>
                        </div>
                        <div class="flex gap-3">
                            <div class="flex-1">
                                <label class="block text-sm text-gray-400 mb-1">籤號</label>
                                <select id="oracle-number" class="input-field w-full rounded p-2 text-sm"
                                    onchange="previewOracle()">
                                    <!-- Populated by JS -->
                                </select>
                            </div>
                        </div>
                        <div id="oracle-preview" class="text-xs p-3 bg-white/5 rounded border border-gray-800 hidden">
                            <div class="text-yellow-600 font-bold mb-1" id="preview-story"></div>
                            <div class="text-gray-400 italic whitespace-pre-wrap" id="preview-poem"></div>
                        </div>
                    </div>
                </div>

                <!-- Western Specific Inputs -->
                <div id="western-inputs" class="flex flex-col gap-5 mt-2 hidden">
                    <div class="space-y-4 p-4 border border-gray-700 rounded-lg bg-black/20">
                        <h3 class="text-yellow-500 font-bold mb-2">塔羅牌陣設定</h3>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">選擇牌陣</label>
                            <select id="tarot-spread" class="input-field w-full rounded p-2 text-sm"
                                onchange="generateCardSelectors()">
                                <option value="1">單張牌 (簡易指引)</option>
                                <option value="3" selected>三張牌 (過去/現在/未來)</option>
                                <option value="4">關係牌陣 (雙方狀態與發展)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2 flex items-center justify-between">
                                設定抽出的牌
                                <label class="flex items-center text-xs cursor-pointer">
                                    <input type="checkbox" id="tarot-no-reverse" class="mr-1 accent-yellow-500"> 不分正逆位
                                </label>
                            </label>
                            <div id="tarot-cards-container" class="space-y-3">
                                <!-- Dynamically generated by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Random Draw Button (Eastern only) -->
                <button id="random-draw-btn"
                    class="w-full py-2 rounded-lg font-bold text-sm mt-2 border border-yellow-700/50 text-yellow-500 hover:bg-yellow-900/20 transition-colors flex items-center justify-center gap-2"
                    onclick="randomDraw()">
                    🎲 隨機抽籤（不指定籤號）
                </button>

                <!-- Action Button -->
                <button id="submit-btn"
                    class="generate-btn w-full py-4 rounded-lg font-bold text-lg mt-4 flex items-center justify-center gap-2"
                    onclick="handlePredict()">
                    <span id="btn-text">請大師解惑</span>
                </button>
            </div>

            <!-- Right Column: Results Area -->
            <div class="h-full">
                <div id="result-placeholder"
                    class="h-full min-h-[400px] border border-gray-700/50 rounded-lg bg-black/30 flex flex-col items-center justify-center p-8 text-center text-gray-500">
                    <div class="text-4xl mb-4">🔮</div>
                    <p>輸入您的問題與籤牌資訊<br>大師將為您指點迷津</p>
                </div>

                <div id="result-content"
                    class="h-full min-h-[400px] border gold-border rounded-lg bg-black/40 p-6 overflow-y-auto hidden">
                    <!-- Results injected here -->
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-12 mb-8 text-center text-gray-500 text-sm space-y-2">
        <p class="text-gray-400">🔮 數位命理諮商大師 ✦ 通曉東西神諭</p>
        <p>提供 27 種東方靈籤 ✦ 78 張塔羅牌解讀</p>
        <p class="text-xs text-gray-600">本工具僅供娛樂參考，不構成任何專業建議</p>
    </footer>

    <!-- Load Utility Script (if any) -->
    <!-- No more oracle-data.js -->

    <script>
        // --- Oracle Data Config ---
        const ORACLE_CONFIG = {
            // -- Standard Major Systems --
            'mazu60': { name: '媽祖六十甲子籤', file: 'data/mazu60.json', count: 60 },
            'guanyin100': { name: '觀音一百籤', file: 'data/guanyin100.json', count: 100 },
            'guandi100': { name: '雷雨師一百籤 (關帝/城隍)', file: 'data/guandi100.json', count: 100 },
            'tudigong28': { name: '土地公廿八籤 (烘爐地)', file: 'data/tudigong28.json', count: 28 },
            'yuelao': { name: '月老靈籤 (100籤)', file: 'data/yuelao.json', count: 100 },

            // -- Specialized Systems --
            'zhuge384': { name: '諸葛神算 (384籤)', file: 'data/zhuge384.json', count: 384 },
            'sevenkings60': { name: '東港鎮海宮七王爺靈籤', file: 'data/sevenkings60.json', count: 60 },
            'baosheng60': { name: '保生大帝六十籤', file: 'data/baosheng60.json', count: 60 },
            'qingshui50': { name: '清水祖師五十籤', file: 'data/qingshui50.json', count: 50 },
            'luzu100': { name: '呂祖靈籤一百籤', file: 'data/luzu100.json', count: 100 },
            'luzu60': { name: '呂仙祖六十籤 (指南宮)', file: 'data/luzu60.json', count: 60 },
            'zhusheng30': { name: '註生娘娘三十籤', file: 'data/zhusheng30.json', count: 30 },
            'beidi51': { name: '北帝靈籤 (五十一籤)', file: 'data/beidi51.json', count: 51 },
            'fourface30': { name: '四面佛三十籤', file: 'data/fourface30.json', count: 30 },
            'caishin100': { name: '五路財神一百籤', file: 'data/caishin100.json', count: 100 },
            'beidi100': { name: '北帝一百籤 (罕見版)', file: 'data/beidi100.json', count: 100 },

            // -- Variations & Lesser Known --
            'guanyin28': { name: '觀音廿八籤 (小型)', file: 'data/guanyin28.json', count: 28 },
            'guanyin24': { name: '觀音廿四籤 (精簡)', file: 'data/guanyin24.json', count: 24 },
            'zodiac28': { name: '二十八星宿籤', file: 'data/zodiac28.json', count: 28 },
            'pienchu100': { name: '扁鵲神醫藥籤 (100籤)', file: 'data/pienchu100.json', count: 100 },
            'yaoqian50': { name: '藥籤 (五十籤)', file: 'data/yaoqian50.json', count: 50 },
            'yaoqian200': { name: '藥籤 (二百籤)', file: 'data/yaoqian200.json', count: 200 },
            'lukang100': { name: '鹿港天后宮一百籤', file: 'data/lukang100.json', count: 100 },
            'penghu100': { name: '澎湖天后宮一百籤', file: 'data/penghu100.json', count: 100 },
            'zhuge64': { name: '諸葛孔明六十四籤 (金錢卦)', file: 'data/zhuge64.json', count: 64 },
            'zhuge32': { name: '諸葛孔明三十二籤 (金錢卦)', file: 'data/zhuge32.json', count: 32 }
        };

        let loadedOracleData = {};

        // --- Search/Filter Logic ---
        function filterOracleTypes() {
            const search = document.getElementById('oracle-search').value.toLowerCase();
            const select = document.getElementById('oracle-type');
            const options = select.options;

            for (let i = 0; i < options.length; i++) {
                const text = options[i].text.toLowerCase();
                const matches = text.includes(search);
                options[i].style.display = matches ? '' : 'none';
            }
        }

        // --- Tarot Data ---
        const majorArcana = ["愚人", "魔術師", "女祭司", "皇后", "皇帝", "教皇", "戀人", "戰車", "力量", "隱者", "命運之輪", "正義", "倒吊人", "死神", "節制", "惡魔", "高塔", "星星", "月亮", "太陽", "審判", "世界"];
        const suits = ["權杖", "聖杯", "寶劍", "錢幣"];
        const numbers = ["王牌", "二", "三", "四", "五", "六", "七", "八", "九", "十", "侍者", "騎士", "王后", "國王"];
        let allCards = [...majorArcana];
        suits.forEach(suit => {
            numbers.forEach(num => allCards.push(`${suit}${num}`));
        });

        // --- State ---
        let currentMode = 'eastern';
        let selectedCategory = '其他';

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('#category-chips button');
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    chips.forEach(c => {
                        c.classList.remove('border-yellow-500', 'text-yellow-500');
                        c.classList.add('border-gray-600');
                    });
                    chip.classList.add('border-yellow-500', 'text-yellow-500');
                    chip.classList.remove('border-gray-600');
                    selectedCategory = chip.getAttribute('data-val');
                });
            });

            updateOracleNumbers();
            generateCardSelectors();

            document.getElementById('tarot-no-reverse').addEventListener('change', () => {
                const selects = document.querySelectorAll('.tarot-dir-select');
                selects.forEach(s => s.disabled = document.getElementById('tarot-no-reverse').checked);
            });
        });

        // --- Eastern Data Logic ---
        async function updateOracleNumbers() {
            const type = document.getElementById('oracle-type').value;
            const select = document.getElementById('oracle-number');
            const config = ORACLE_CONFIG[type];

            // Load data if not already loaded
            if (!loadedOracleData[type]) {
                try {
                    const response = await fetch(config.file);
                    if (response.ok) {
                        loadedOracleData[type] = await response.json();
                    } else {
                        console.error("Failed to load oracle data:", config.file);
                        loadedOracleData[type] = [];
                    }
                } catch (e) {
                    console.error("Error fetching data:", e);
                    loadedOracleData[type] = [];
                }
            }

            const data = loadedOracleData[type];
            select.innerHTML = '<option value="">請選擇籤號...</option>';

            // If data is empty but we know the count, generate empty options
            const count = data.length > 0 ? data.length : config.count;
            for (let i = 1; i <= count; i++) {
                const found = data.find(item => item.id === i);
                const label = found ? found.no : `第${i}籤`;
                const ganzhi = found && found.ganzhi ? ` (${found.ganzhi})` : '';
                select.innerHTML += `<option value="${i}">${label}${ganzhi}</option>`;
            }
            previewOracle();
        }

        function previewOracle() {
            const type = document.getElementById('oracle-type').value;
            const id = parseInt(document.getElementById('oracle-number').value);
            const preview = document.getElementById('oracle-preview');

            if (!id) {
                preview.classList.add('hidden');
                return;
            }

            const data = (loadedOracleData[type] || []).find(i => i.id === id);
            if (data && data.poem !== "資料準備中..." && data.poem !== "系統資料更新中...") {
                preview.classList.remove('hidden');
                document.getElementById('preview-story').innerText = data.story ? `【典故：${data.story}】` : '【經典籤詩】';
                document.getElementById('preview-poem').innerText = data.poem;
            } else {
                preview.classList.add('hidden');
            }
        }

        // --- UI Interactions ---
        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-eastern').classList.toggle('active', mode === 'eastern');
            document.getElementById('tab-western').classList.toggle('active', mode === 'western');

            document.getElementById('eastern-inputs').classList.toggle('hidden', mode !== 'eastern');
            document.getElementById('western-inputs').classList.toggle('hidden', mode !== 'western');
        }

        function generateCardSelectors() {
            const spreadCount = parseInt(document.getElementById('tarot-spread').value);
            const container = document.getElementById('tarot-cards-container');
            container.innerHTML = '';

            const positionNames = spreadCount === 3 ? ["過去", "現在", "未來"] :
                spreadCount === 4 ? ["你的現狀", "對方現狀", "關係阻礙", "未來發展"] : ["單張指引"];

            let optionsHTML = '<option value="">請選擇牌...</option>';
            allCards.forEach(card => {
                optionsHTML += `<option value="${card}">${card}</option>`;
            });

            for (let i = 0; i < spreadCount; i++) {
                const isNoReverse = document.getElementById('tarot-no-reverse').checked;
                container.innerHTML += `
                    <div class="flex items-center gap-2 bg-black/40 p-2 rounded border border-gray-700">
                        <span class="text-xs text-gray-400 w-12 text-right">${positionNames[i]}</span>
                        <select class="input-field flex-1 rounded p-1 text-sm tarot-card-val" required>
                            ${optionsHTML}
                        </select>
                        <select class="input-field w-20 rounded p-1 text-sm tarot-dir-select" ${isNoReverse ? 'disabled' : ''}>
                            <option value="正位">正位</option>
                            <option value="逆位">逆位</option>
                        </select>
                    </div>
                `;
            }
        }

        };

        function generateTarotContent(question, category) {
            const cardEls = document.querySelectorAll('.tarot-card-val');
            const dirEls = document.querySelectorAll('.tarot-dir-select');
            const noReverse = document.getElementById('tarot-no-reverse').checked;
            const spreadVal = parseInt(document.getElementById('tarot-spread').value);
            const posNames = spreadVal === 3 ? ["過去", "現在", "未來"] :
                spreadVal === 4 ? ["你的現狀", "對方現狀", "關係阻礙", "未來發展"] : ["單張指引"];

            let cards = [];
            let allSelected = true;
            for (let i = 0; i < cardEls.length; i++) {
                const name = cardEls[i].value;
                if (!name) { allSelected = false; break; }
                const dir = noReverse ? "正位" : dirEls[i].value;
                cards.push({ name, dir, pos: posNames[i] || `第${i + 1}張` });
            }
            if (!allSelected) {
                return `<div class="text-center text-yellow-500 p-8"><p class="text-lg">⚠️ 請選擇所有位置的塔羅牌</p></div>`;
            }

            let html = `<h2 class="text-xl font-bold text-yellow-500 mb-4">🔮 塔羅牌陣解讀</h2>`;
            html += `<p class="text-gray-400 text-sm mb-4">問題：「${question}」 ｜ 領域：${category}</p>`;

            // Define suits for minor arcana parsing
            const suits = ["權杖", "聖杯", "寶劍", "錢幣"];

            cards.forEach((card, idx) => {
                const isReversed = card.dir === "逆位";
                const meaning = TAROT_MEANINGS[card.name];
                let desc = '', adviceText = '';

                if (meaning) {
                    desc = isReversed ? meaning.rev : meaning.up;
                    adviceText = meaning.advice[category] || meaning.advice["其他"];
                } else {
                    // Minor arcana
                    const suitKey = suits.find(s => card.name.startsWith(s));
                    const numKey = suitKey ? card.name.replace(suitKey, '') : '';
                    const base = MINOR_BASE[numKey];
                    const suitInfo = SUIT_THEMES[suitKey];
                    if (base && suitInfo) {
                        desc = `${suitInfo.theme} — ${isReversed ? base.rev : base.up}`;
                        adviceText = `此牌屬於${suitInfo.element}元素，${isReversed ? '提醒您正視目前的困難，調整步伐。' : '指引您順勢而行，把握當下的能量。'}`;
                    } else {
                        desc = isReversed ? "需要重新審視方向" : "正面能量引導";
                        adviceText = "順應本心，自有安排。";
                    }
                }

                html += `
                    <div class="mb-5 p-4 rounded-lg border ${isReversed ? 'border-purple-800 bg-purple-900/10' : 'border-yellow-900/40 bg-yellow-900/10'}">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-xs px-2 py-0.5 rounded ${isReversed ? 'bg-purple-800 text-purple-200' : 'bg-yellow-800 text-yellow-200'}">${card.pos}</span>
                            <span class="font-bold text-lg ${isReversed ? 'text-purple-300' : 'text-yellow-400'}">${card.name}</span>
                            <span class="text-xs ${isReversed ? 'text-purple-400' : 'text-yellow-600'}">${card.dir}</span>
                        </div>
                        <p class="text-gray-300 text-sm mb-2">✦ 牌義：${desc}</p>
                        <p class="text-gray-400 text-sm italic">💡 ${adviceText}</p>
                    </div>`;
            });

            // Overall summary
            html += `
                <div class="mt-6 p-4 bg-black/50 rounded-lg border border-yellow-700/30">
                    <h3 class="font-bold text-yellow-500 mb-2">🌟 大師綜合解讀</h3>
                    <p class="text-gray-300 leading-relaxed">
                        ${generateTarotSummary(cards, category, question)}
                    </p>
                </div>`;
            return html;
        }

        function generateTarotSummary(cards, category, question) {
            const reversedCount = cards.filter(c => c.dir === "逆位").length;
            const ratio = reversedCount / cards.length;
            let tone = '';
            if (ratio === 0) tone = '整體牌陣非常正面，充滿希望與光的能量。';
            else if (ratio <= 0.3) tone = '牌陣整體偏向正面，僅有小部分需要留意。';
            else if (ratio <= 0.5) tone = '牌陣呈現陰陽交織，提醒您在機會中保持謹慎。';
            else tone = '牌陣提示目前可能面臨一些挑戰，但每個挑戰都是成長的養分。';

            const catMsg = {
                "工作": "在職業道路上，現在是沉澱與重新定位的時刻。相信自己的專業能力，同時保持學習的心態。",
                "感情": "感情的世界需要用心經營。無論現狀如何，真誠地面對自己的內心，才能找到真正的幸福。",
                "金錢": "財運方面，穩健經營比冒險投機更能為您帶來長久的富足。腳踏實地，財富自然來。",
                "家庭": "家庭是您最堅實的後盾。用愛與耐心灌溉家庭關係，您會收穫滿滿的幸福。",
                "其他": "無論面對什麼樣的困惑，請記住：您擁有改變命運的力量。保持正念，一切都會好起來的。"
            };
            return `${tone}<br><br>${catMsg[category] || catMsg["其他"]}<br><br>大師寄語：每一張牌都是宇宙給您的啟示。重要的不是牌面上寫了什麼，而是它在您心中喚起了什麼感受。帶著這份感悟，勇敢地走下去吧。🙏`;
        }
    </script>
</body>

</html>
